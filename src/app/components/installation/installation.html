<section id="install" class="border-t border-gray-100 bg-gray-50/60 py-24">
  <div class="mx-auto max-w-6xl px-6">
    <div class="max-w-2xl">
      <h2 class="text-3xl font-bold tracking-tight text-gray-900 sm:text-4xl">Up and running in a minute.</h2>
      <p class="mt-4 text-lg text-gray-600">No schema to learn beyond the props you already see above.</p>
    </div>

    <div class="mt-12 grid gap-6 lg:grid-cols-2">
      <div class="rounded-2xl border border-gray-200 bg-white p-6">
        <p class="text-sm font-semibold text-gray-500">1. Install</p>
        <pre
          class="mt-3 overflow-x-auto rounded-xl bg-gray-900 p-4 font-mono text-[13px] text-gray-100"><code>{{ installSnippet }}</code></pre>

        <p class="mt-6 text-sm font-semibold text-gray-500">2. Import</p>
        <pre
          class="mt-3 overflow-x-auto rounded-xl bg-gray-900 p-4 font-mono text-[13px] text-gray-100"><code>{{ importSnippet }}</code></pre>
      </div>

      <div class="rounded-2xl border border-gray-200 bg-white p-6">
        <p class="text-sm font-semibold text-gray-500">3. Describe your data</p>
        <pre
          class="mt-3 overflow-x-auto rounded-xl bg-gray-900 p-4 font-mono text-[13px] text-gray-100"><code>{{ usageSnippet }}</code></pre>

        <p class="mt-6 text-sm font-semibold text-gray-500">4. Drop it in your template</p>
        <pre
          class="mt-3 overflow-x-auto rounded-xl bg-gray-900 p-4 font-mono text-[13px] text-gray-100"><code>{{ templateSnippet }}</code></pre>
      </div>
    </div>
  </div>
</section>
