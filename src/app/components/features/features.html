<section id="features" class="border-t border-gray-100 bg-gray-50/60 py-24">
  <div class="mx-auto max-w-6xl px-6">
    <div class="max-w-2xl">
      <h2 class="text-3xl font-bold tracking-tight text-gray-900 sm:text-4xl">
        Everything a data table needs, nothing it doesn't.
      </h2>
      <p class="mt-4 text-lg text-gray-600">
        One Angular component covers the cases that usually take a handful of libraries to solve.
      </p>
    </div>

    <div class="mt-14 grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
      @for (feature of features; track feature.title) {
        <div
          class="rounded-2xl border border-gray-200 bg-white p-6 transition hover:-translate-y-0.5 hover:shadow-lg hover:shadow-gray-200/60">
          <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-brand-50 text-brand-600">
            <svg viewBox="0 0 24 24" class="h-5 w-5 fill-none stroke-current stroke-2">
              <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="feature.icon" />
            </svg>
          </div>
          <h3 class="mt-4 font-semibold text-gray-900">{{ feature.title }}</h3>
          <p class="mt-2 text-sm leading-relaxed text-gray-600">{{ feature.description }}</p>
        </div>
      }
    </div>
  </div>
</section>
